name: img2map-parity

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parity-and-determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependency for legacy converter
        run: |
          python -m pip install --upgrade pip
          pip install pillow
      - name: Build and run img2map parity check
        run: |
          tests/test_img2map_parity.sh
